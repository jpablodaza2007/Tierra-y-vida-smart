<div class="auth-page">
  <nav class="navbar-interna">
    <div class="nav-content-interna">
      <div class="logo"><span class="green-text">Tierra y Vida</span> Smart</div>
      <div class="nav-links">
        <button class="btn-nav" routerLink="/home">Volver al Inicio</button>
      </div>
    </div>
  </nav>
  <div
    style="
      width: 400px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(46, 204, 113, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,.7);
      font-family: sans-serif;
      color: white;
    "
  >
    <h2
      style="
        text-align: center;
        color: rgb(46, 204, 113);
        margin-bottom: 10px;
      "
    >
      Iniciar Sesión
    </h2>

    <p
      style="
        text-align: center;
        color: rgba(255,255,255,.75);
        font-size: 14px;
        margin-bottom: 25px;
      "
    >
      Tierra y Vida Smart
    </p>

    <form #loginForm="ngForm" (ngSubmit)="onLogin()">

      <div style="margin-bottom:15px;">
        <label
          style="
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:white;
          "
        >
          Usuario:
        </label>

        <input
          type="text"
          [(ngModel)]="credenciales.username"
          name="username"
          required
          style="
            width:100%;
            padding:12px;
            background: rgba(46,204,113,.2);
            border:1px solid rgba(46,204,113,.6);
            border-radius:6px;
            box-sizing:border-box;
            color:white;
            outline:none;
          "
        >
      </div>

      <div style="margin-bottom:20px;">
        <label
          style="
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:white;
          "
        >
          Contraseña:
        </label>

        <input
          type="password"
          [(ngModel)]="credenciales.password"
          name="password"
          required
          style="
            width:100%;
            padding:12px;
            background: rgba(46,204,113,.2);
            border:1px solid rgba(46,204,113,.6);
            border-radius:6px;
            box-sizing:border-box;
            color:white;
            outline:none;
          "
        >
      </div>

      <button
        type="submit"
        [disabled]="enviando"
        style="
          width:100%;
          padding:12px;
          background: rgb(46,204,113);
          color:black;
          border:none;
          border-radius:6px;
          font-size:16px;
          font-weight:bold;
          cursor:pointer;
          transition:.3s;
        "
      >
        {{ enviando ? 'Ingresando...' : 'Ingresar' }}
      </button>

    </form>

    <div
      *ngIf="mensajeError"
      role="alert"
      style="
        margin-top:16px;
        padding:12px;
        border-radius:6px;
        background: rgba(255,0,0,.15);
        border:1px solid #ff4d4d;
        color:white;
      "
    >
      <strong>Atención</strong><br>
      {{ mensajeError }}
    </div>

    <div
      style="
        text-align:center;
        margin:25px 0;
        position:relative;
      "
    >
      <span
        style="
          background: rgba(0,0,0,.75);
          padding:0 10px;
          position:relative;
          z-index:1;
          color:rgba(255,255,255,.8);
        "
      >
        O continúa con
      </span>

      <hr
        style="
          position:absolute;
          width:100%;
          top:50%;
          left:0;
          border:none;
          border-top:1px solid rgba(46,204,113,.3);
        "
      >
    </div>

    <div style="display:flex; justify-content:center;">
      <ng-container *ngIf="enviandoGoogle; else googleButton">
        <span style="color:white;">
          Validando cuenta de Google...
        </span>
      </ng-container>

      <ng-template #googleButton>
        <asl-google-signin-button
          type="standard"
          size="large"
          text="continue_with"
          theme="outline">
        </asl-google-signin-button>
      </ng-template>
    </div>

    <p
      style="
        text-align:center;
        margin-top:25px;
        color:white;
      "
    >
      ¿No tienes cuenta?

      <a
        routerLink="/registro"
        style="
          color: rgb(46,204,113);
          font-weight:bold;
          text-decoration:none;
        "
      >
        Regístrate aquí
      </a>
    </p>

  </div>
</div>
