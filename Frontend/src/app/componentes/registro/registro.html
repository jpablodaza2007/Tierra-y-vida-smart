<div class="auth-page">
  <nav class="navbar-interna">
    <div class="nav-content-interna">
      <div class="logo"><span class="green-text">Tierra y Vida</span> Smart</div>
      <div class="nav-links">
        <button class="btn-nav" routerLink="/home">Volver al Inicio</button>
      </div>
    </div>
  </nav>
  <div
    style="
      width: 420px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(46, 204, 113, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,.7);
      font-family: sans-serif;
      color: white;
    "
  >
    <h2
      style="
        text-align: center;
        color: rgb(46,204,113);
        margin-bottom: 10px;
      "
    >
      Crear Cuenta
    </h2>

    <form [formGroup]="registroForm" (ngSubmit)="onRegistro()">

      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:5px;font-weight:bold;color:white;">
          Nombre Completo:
        </label>

        <input
          type="text"
          formControlName="nombre_completo"
          style="
            width:100%;
            padding:12px;
            background:rgba(46,204,113,.2);
            border:1px solid rgba(46,204,113,.6);
            border-radius:6px;
            box-sizing:border-box;
            color:white;
            outline:none;
          "
        >

        <small
          *ngIf="registroForm.get('nombre_completo')?.invalid && registroForm.get('nombre_completo')?.touched"
          style="display:block;margin-top:4px;color:#ff7675;"
        >
          Este campo es obligatorio.
        </small>
      </div>

      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:5px;font-weight:bold;color:white;">
          Nombre de Usuario (Username):
        </label>

        <input
          type="text"
          formControlName="username"
          style="
            width:100%;
            padding:12px;
            background:rgba(46,204,113,.2);
            border:1px solid rgba(46,204,113,.6);
            border-radius:6px;
            box-sizing:border-box;
            color:white;
            outline:none;
          "
        >

        <small
          *ngIf="registroForm.get('username')?.invalid && registroForm.get('username')?.touched"
          style="display:block;margin-top:4px;color:#ff7675;"
        >
          Este campo es obligatorio.
        </small>
      </div>

      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:5px;font-weight:bold;color:white;">
          Correo Electrónico:
        </label>

        <input
          type="email"
          formControlName="email"
          style="
            width:100%;
            padding:12px;
            background:rgba(46,204,113,.2);
            border:1px solid rgba(46,204,113,.6);
            border-radius:6px;
            box-sizing:border-box;
            color:white;
            outline:none;
          "
        >

        <small
          *ngIf="registroForm.get('email')?.invalid && registroForm.get('email')?.touched"
          style="display:block;margin-top:4px;color:#ff7675;"
        >
          Ingresa un correo válido.
        </small>
      </div>

      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:5px;font-weight:bold;color:white;">
          Contraseña:
        </label>

        <input
          type="password"
          formControlName="password"
          style="
            width:100%;
            padding:12px;
            background:rgba(46,204,113,.2);
            border:1px solid rgba(46,204,113,.6);
            border-radius:6px;
            box-sizing:border-box;
            color:white;
            outline:none;
          "
        >

        <small
          *ngIf="registroForm.get('password')?.invalid && registroForm.get('password')?.touched"
          style="display:block;margin-top:4px;color:#ff7675;"
        >
          Mínimo 6 caracteres y una mayúscula.
        </small>
      </div>

      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:5px;font-weight:bold;color:white;">
          Tipo de Rol:
        </label>

        <select
          formControlName="tipo_rol"
          style="
            width:100%;
            padding:12px;
            background:rgba(46,204,113,.2);
            border:1px solid rgba(46,204,113,.6);
            border-radius:6px;
            box-sizing:border-box;
            color:white;
            outline:none;
          "
        >
          <option value="Campesino" style="color:black;">Campesino</option>
          <option value="Contribuyente" style="color:black;">Contribuyente ecológico</option>
          <option value="Alcaldia" style="color:black;">Alcaldía</option>
        </select>
      </div>

      <div
        *ngIf="requiereComprobante"
        style="
          margin-bottom:16px;
          padding:12px;
          border:1px dashed rgba(46,204,113,.6);
          border-radius:6px;
          background:rgba(46,204,113,.1);
        "
      >
        <label style="display:block;margin-bottom:6px;font-weight:bold;color:white;">
          Comprobante de registro:
        </label>

        <input
          type="file"
          (change)="onArchivoSeleccionado($event)"
          accept=".pdf,.jpg,.jpeg,.png"
          style="width:100%;color:white;"
        >

        <small
          *ngIf="registroForm.get('comprobante_registro')?.invalid && registroForm.get('comprobante_registro')?.touched"
          style="display:block;margin-top:6px;color:#ff7675;"
        >
          Debes adjuntar un comprobante para este rol.
        </small>
      </div>

      <button
        type="submit"
        [disabled]="enviando"
        style="
          width:100%;
          padding:12px;
          background:rgb(46,204,113);
          color:black;
          border:none;
          border-radius:6px;
          font-weight:bold;
          font-size:16px;
          cursor:pointer;
        "
      >
        {{ enviando ? 'Registrando...' : 'Registrarse' }}
      </button>

    </form>

    @if (mensajeError) {
      <div
        role="alert"
        style="
          margin-top:16px;
          padding:12px;
          border:1px solid #ff4d4d;
          border-radius:6px;
          background:rgba(255,0,0,.15);
          color:white;
        "
      >
        <strong>Atención</strong><br>
        <span>{{ mensajeError }}</span>
      </div>
    }

    <p
      style="
        text-align:center;
        margin-top:20px;
        color:white;
      "
    >
      ¿Ya tienes una cuenta?

      <a
        routerLink="/login"
        style="
          color:rgb(46,204,113);
          text-decoration:none;
          font-weight:bold;
        "
      >
        Inicia sesión
      </a>
    </p>

  </div>
</div>
